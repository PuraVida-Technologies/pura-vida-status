# Change these first
owner: PuraVida-Technologies # Your GitHub organization or username, where this repository lives
repo: pura-vida-status # The name of this repository

# Upptime is the off-cluster (GitHub) status page. It keeps BROAD,
# product-level "is it up" checks plus an external watchdog. Finer-grained
# per-service status now lives on the OneUptime status pages (devops-263):
#   - Internal (VPN):    https://status.pvbtc.cloud/
#   - Public, detailed:  https://status.detail.puravidabitcoin.io/
sites:
  - name: Pura Vida Website
    url: https://puravidabitcoin.io/
  - name: Pura Vida Pay
    url: https://pay.puravidabitcoin.io/
  - name: Pura Vida Merchants
    url: https://merchants.puravidabitcoin.io/
  - name: Pura Vida Market
    url: https://market.puravidabitcoin.io/
  - name: Pura Vida API
    url: https://api.puravidabitcoin.io/graphql
    method: POST
    headers:
      - "Content-Type: application/json"
    body: '{"operationName":"btcPriceList","variables":{"range":"ONE_DAY"},"query":"query btcPriceList($range: PriceGraphRange!) { btcPriceList(range: $range) { timestamp price { base offset currencyUnit formattedAmount } } }"}'
    __dangerous__body_down: "errors"
  - name: Pura Vida ATMs
    url: https://admin.atm.puravidabitcoin.io/login
    __dangerous__disable_verify_peer: true
  # External watchdog: Upptime runs off-cluster, so a 200 here means the
  # cluster, OneUptime, and the detailed public status page are all reachable
  # from outside. This is what catches a full-cluster outage.
  - name: Service Monitoring System
    url: https://status.detail.puravidabitcoin.io/

# Infra checks (Stablesats / Bitcoin / Lightning / Signer / Exchange-Rates /
# Payment Forwarding) were moved to the OneUptime pages above and removed
# here on purpose; the Signer in particular should not be on the public page.

# Private Resources; we should transplant these elsewhere.
